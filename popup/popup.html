<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <header>
        <img src="../icons/icon-32.png" alt="logo" class="logo">
        <h3>Voice Control</h3>
    </header>

    <main>
        <div class="display-container">
            <span id="volValue">100</span><small>%</small>
        </div>
        
        <input type="range" id="volSlider" min="0" max="600" value="100" step="10">
        
        <div class="labels">
            <span>0%</span>
            <span>600%</span>
        </div>

        <div class="warning-box" id="warningBox">
            <span style="font-size: 1.2em; font-weight: bold;">
                ⚠️ Warning: Exceeding 100% may cause audio distortion
            </span>
        </div>
    </main>

    <footer>
        <button id="resetBtn">Reset Volume</button>
        <div class="version">v1.0.0</div>
    </footer>

    <script src="popup.js"></script>
</body>
</html>
